name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test with coverage gates
        if: ${{ matrix.node-version == 20 }}
        run: npm run test:coverage
        env:
          CI: 'true'

      - name: Test
        if: ${{ matrix.node-version != 20 }}
        run: npm test
        env:
          CI: 'true'

      - name: Upload report artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: buttonmash-artifacts-node${{ matrix.node-version }}
          path: |
            buttonmash-report/
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  action-smoke:
    name: composite action smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Pack the local release artifact
        id: package
        run: echo "path=$GITHUB_WORKSPACE/$(npm pack --silent)" >> "$GITHUB_OUTPUT"

      - name: Start smoke target
        run: |
          node test/fixtures/action-server.mjs &
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run the local composite action
        id: buttonmash
        uses: ./
        with:
          target: http://127.0.0.1:4173
          version: file:${{ steps.package.outputs.path }}
          # Pinned seed: with a random seed the monkey can pick `back` as an
          # early action, land on about:blank, and log a low-severity guardrail
          # finding — failing the findings=0 assertion below.
          args: --seed ci --dry-run --max-actions 5 --max-duration 10 --formats json --log-level silent
          upload-report: 'false'

      - name: Verify action outputs
        env:
          EXIT_CODE: ${{ steps.buttonmash.outputs.exit-code }}
          FINDINGS: ${{ steps.buttonmash.outputs.findings }}
          REPORT_PATH: ${{ steps.buttonmash.outputs.report-path }}
        run: |
          test "$EXIT_CODE" = "0"
          test "$FINDINGS" = "0"
          test -f "$REPORT_PATH/results.json"
