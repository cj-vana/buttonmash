name: 'ButtonMash Chaos Monkey'
description: 'Run the buttonmash CI chaos monkey against a web app and fail the build on findings.'
branding:
  icon: 'alert-triangle'
  color: 'orange'
inputs:
  target:
    description: 'URL to test (your app must already be running/served).'
    required: true
  args:
    description: 'Extra buttonmash CLI args (e.g. "--seed ci --max-actions 800 --config buttonmash.config.ts").'
    required: false
    default: ''
  version:
    description: 'buttonmash npm version to run.'
    required: false
    default: 'latest'
  node-version:
    description: 'Node version.'
    required: false
    default: '20'
  browser:
    description: 'chromium | firefox | webkit'
    required: false
    default: 'chromium'
  fail-on:
    description: 'Minimum finding severity that fails the build.'
    required: false
    default: 'high'
  upload-report:
    description: 'Upload the buttonmash-report/ directory as a build artifact.'
    required: false
    default: 'true'
outputs:
  exit-code:
    description: 'buttonmash exit code (0 clean, 1 findings/safety stop, 2 tool error/interruption).'
    value: ${{ steps.run.outputs.exit-code }}
  findings:
    description: 'Total number of findings.'
    value: ${{ steps.run.outputs.findings }}
  report-path:
    description: 'Path to the report directory.'
    value: ${{ steps.run.outputs.report-path }}
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
    - id: install
      shell: bash
      env:
        BM_VERSION: ${{ inputs.version }}
        BM_BROWSER: ${{ inputs.browser }}
      run: |
        DIR="${RUNNER_TEMP:-/tmp}/buttonmash"
        mkdir -p "$DIR" && cd "$DIR"
        npm init -y >/dev/null 2>&1
        npm i "buttonmash@${BM_VERSION}" >/dev/null
        # Install the browser matching buttonmash's bundled Playwright version.
        npx playwright install --with-deps "${BM_BROWSER}"
        echo "dir=$DIR" >> "$GITHUB_OUTPUT"
    - id: run
      shell: bash
      # Run from the workspace so a committed buttonmash.config.* is discovered
      # and repo-relative --config paths resolve. Inputs go through env, never
      # interpolated into the script, because ${{ }} expands before bash sees the
      # text, so a crafted `target` would otherwise execute on the runner.
      working-directory: ${{ github.workspace }}
      env:
        BM_DIR: ${{ steps.install.outputs.dir }}
        BM_TARGET: ${{ inputs.target }}
        BM_BROWSER: ${{ inputs.browser }}
        BM_FAIL_ON: ${{ inputs.fail-on }}
        BM_ARGS: ${{ inputs.args }}
      run: |
        set +e
        # shellcheck disable=SC2086  # BM_ARGS is intentionally word-split
        "$BM_DIR/node_modules/.bin/buttonmash" run "$BM_TARGET" \
          --browser "$BM_BROWSER" \
          --fail-on "$BM_FAIL_ON" \
          --out "$GITHUB_WORKSPACE/buttonmash-report" \
          $BM_ARGS
        CODE=$?
        echo "exit-code=$CODE" >> "$GITHUB_OUTPUT"
        echo "report-path=$GITHUB_WORKSPACE/buttonmash-report" >> "$GITHUB_OUTPUT"
        FINDINGS=$(node -p "try{require(process.env.GITHUB_WORKSPACE+'/buttonmash-report/results.json').findings.length}catch{''}" 2>/dev/null || echo '')
        echo "findings=$FINDINGS" >> "$GITHUB_OUTPUT"
        exit $CODE
    - if: ${{ always() && inputs.upload-report == 'true' }}
      uses: actions/upload-artifact@v5
      with:
        name: buttonmash-report
        path: buttonmash-report/
        if-no-files-found: ignore
        retention-days: 14
